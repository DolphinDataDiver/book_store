services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: book-store-keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/book-store-realm.json:/opt/keycloak/data/import/book-store-realm.json:ro
